<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperMD Modern Example</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: sans-serif;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      margin-top: 0;
    }
    .editor-container {
      flex: 1;
      border: 1px solid #ddd;
      overflow: hidden; /* Important for CodeMirror to resize properly */
    }
    .CodeMirror {
      height: 100%;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>HyperMD Example</h1>
    <div class="editor-container">
      <textarea id="myTextarea"># Hello HyperMD

This is a **modern** example using Vite and TypeScript.

- [x] Easy setup
- [ ] Customizable
- [ ] Powerful

$$ E = mc^2 $$

| Feature | Status |
| :--- | :--- |
| Modern | Yes |
| Legacy | Removed |

Try clicking this link: [HyperMD](https://laobubu.net/HyperMD/)
</textarea>
    </div>
  </div>
  <script type="module" src="/example.ts"></script>
</body>
</html>
